name: "3940-Lab-3"
services:
  web:
    container_name: frontend
    build: /frontend
    ports:
      - "3000:80"
  api:
    container_name: backend
    build: /backend
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_HTTP_PORTS: 5000
      ComposeConnectionString: ${POSTGRES_CONNECTION_STRING}
      AllowedOrigins: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy # Ensure the postgres service is healthy before starting the .NET API
    restart: unless-stopped # Restart the .NET API unless stopped

  postgres:
    container_name: postgres # Name of the PostgreSQL container
    image: postgres:latest # Use the latest PostgreSQL image from Docker Hub
    environment:
      POSTGRES_USER: ${POSTGRES_USER} # Set PostgreSQL user from environment variable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Set PostgreSQL password from environment variable
      POSTGRES_DB: ${POSTGRES_DB} # Set PostgreSQL database name from environment variable
    volumes:
      - postgres-data:/var/lib/postgresql/data # Persist PostgreSQL data on a named volume
    ports:
      - "5433:5432" # Expose PostgreSQL on port 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"] # Health check command to ensure PostgreSQL is ready
      interval: 10s # Interval between health checks
      timeout: 5s # Timeout for the health check
      retries: 5 # Number of retries before marking the container as unhealthy

  pgadmin:
    container_name: pgadmin # Name of the pgAdmin container
    image: dpage/pgadmin4:latest # Use the latest pgAdmin image from Docker Hub
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL} # Set pgAdmin default email from environment variable
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD} # Set pgAdmin default password from environment variable
      PGADMIN_LISTEN_PORT: 5050 # Set the port pgAdmin listens on
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False" # Disable enhanced cookie protection
    depends_on:
      - postgres # Ensure the postgres service is started before pgAdmin
    ports:
      - "5050:5050" # Expose pgAdmin on port 5050

volumes:
  postgres-data: